<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Личный план — задачи, проекты и тренировки</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Личный план">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#04060c radial-gradient(1200px 600px at 50% -10%,#0b1730 0%,#04060c 60%);
  color:#cfe4ff;min-height:100vh;overscroll-behavior:none;
}
#app{max-width:520px;margin:0 auto;padding:0 12px calc(90px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;
  padding:calc(12px + env(safe-area-inset-top)) 2px 12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  background:rgba(4,6,12,.78);border-bottom:1px solid rgba(90,170,255,.18)}
.logo{font-weight:800;letter-spacing:.18em;font-size:15px;color:#9bd1ff}
.gold{font-weight:700;color:#ffd54d;font-size:14px;letter-spacing:.05em}
.gold b,.goldBig b{border:1px solid rgba(255,213,77,.5);border-radius:50%;display:inline-block;width:17px;height:17px;line-height:17px;text-align:center;font-size:10px;margin-right:4px;font-style:normal}
.panel{position:relative;border:1px solid rgba(90,170,255,.25);
  background:linear-gradient(180deg,rgba(12,20,38,.92),rgba(8,13,26,.92));
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  padding:14px;margin:14px 0;border-radius:12px}
.panel::before,.panel::after{display:none}
.panel.danger{border-color:rgba(255,110,110,.45);box-shadow:0 0 18px rgba(255,80,80,.15), inset 0 0 30px rgba(255,80,80,.05)}
.panel.danger::before{border-top-color:#ff7d7d;border-left-color:#ff7d7d}
.panel.danger::after{border-bottom-color:#ff7d7d;border-right-color:#ff7d7d}
.panel.danger h2{color:#ff9d9d;text-shadow:0 0 10px rgba(255,110,110,.5)}
.panel.hiddenq{border-color:rgba(255,213,77,.4);box-shadow:0 0 18px rgba(255,200,60,.12), inset 0 0 30px rgba(255,200,60,.04)}
.panel.hiddenq::before{border-top-color:#ffd54d;border-left-color:#ffd54d}
.panel.hiddenq::after{border-bottom-color:#ffd54d;border-right-color:#ffd54d}
.panel.hiddenq h2{color:#ffe08a;text-shadow:0 0 10px rgba(255,213,77,.5)}
h2{font-size:12px;letter-spacing:.16em;color:#9dceff;margin:0 0 12px;font-weight:700;text-transform:uppercase}
.muted{color:#6f8cb0;font-size:11px;line-height:1.55}
.sec-note{margin-top:10px}
.empty{color:#5c7699;font-size:12px;padding:8px 0}
.btn{display:inline-block;background:rgba(40,90,160,.15);border:1px solid rgba(110,185,255,.5);color:#9fd0ff;
  padding:10px 14px;font-size:12px;letter-spacing:.15em;text-transform:uppercase;border-radius:3px;font-weight:700;font-family:inherit}
.btn:active{background:rgba(80,150,255,.28)}
.btn.primary{background:rgba(60,130,255,.25);color:#dff0ff;box-shadow:0 0 12px rgba(60,140,255,.3)}
.btn.block{display:block;width:100%;text-align:center;margin-top:12px}
.btn.small{padding:6px 10px;font-size:11px;letter-spacing:.08em;min-height:40px}
.btn:disabled{opacity:.35}
.bar{height:10px;background:rgba(90,170,255,.12);border:1px solid rgba(90,170,255,.25);border-radius:2px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#2f7fe0,#54d7ff);box-shadow:0 0 10px rgba(84,215,255,.7);position:relative;overflow:hidden}
.bar i::after{display:none}
.xprow{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.15em;color:#8fb4de;margin-bottom:5px}
.stTop{display:flex;gap:14px;align-items:center}
.rankBox{width:64px;height:64px;flex:none;border:2px solid;display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:900;border-radius:14px;background:rgba(90,182,255,.08)}
.stName{display:block;min-height:44px;background:none;border:0;padding:8px 0;font-family:inherit;font-size:16px;font-weight:700;color:#eaf4ff;text-align:left}
.pen{font-size:11px;color:#5f84ad}
.titleLine{font-size:11px;color:#ffd54d;margin-top:2px;letter-spacing:.08em;text-shadow:0 0 8px rgba(255,213,77,.4)}
.stLvl{font-size:12px;color:#8fb4de;margin-top:3px;letter-spacing:.05em}
.statRow{display:flex;align-items:center;gap:10px;padding:7px 0}
.statName{width:118px;flex:none;font-size:10px;line-height:1.25;letter-spacing:.08em;color:#9cc2ec;overflow-wrap:anywhere}
.statVal{width:34px;flex:none;text-align:right;font-weight:800;color:#dff0ff;font-size:14px}
.statRow .bar{flex:1}
.todayRow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:#c9defa}
.todayRow b{color:#dff0ff}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid rgba(255,213,77,.4);color:#e8d28a;background:rgba(255,213,77,.06);
  min-height:44px;padding:6px 10px;font-size:11px;border-radius:8px;font-family:inherit;letter-spacing:.05em;display:inline-flex;align-items:center}
.chip.on{color:#ffd54d;border-color:#ffd54d;box-shadow:0 0 10px rgba(255,213,77,.35)}
.chip.cf{border-color:rgba(110,185,255,.4);color:#9cc2ec;background:rgba(90,170,255,.06)}
.chip.cf.on{color:#8fd0ff;border-color:#8fd0ff;box-shadow:0 0 10px rgba(90,180,255,.4)}
.fs{color:#ffd54d;font-style:normal;margin-right:3px;text-shadow:0 0 6px rgba(255,213,77,.6)}
.chart{display:flex;gap:8px;align-items:flex-end}
.col{flex:1;text-align:center}
.colbar{height:70px;display:flex;align-items:flex-end;justify-content:center;border-bottom:1px solid rgba(90,170,255,.25);margin-bottom:6px}
.colbar i{display:block;width:60%;background:linear-gradient(180deg,#54d7ff,#2f7fe0);box-shadow:0 0 8px rgba(84,215,255,.5);border-radius:2px 2px 0 0}
.col span{display:block;font-size:10px;color:#6f8cb0;letter-spacing:.05em}
.col b{display:block;font-size:10px;color:#9cc2ec;margin-top:2px;height:12px}
.qitem{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid rgba(90,170,255,.12)}
.qitem:last-of-type{border-bottom:0}
.qcheck{font-size:20px;color:#5ab0ff;background:none;border:none;padding:2px 4px;font-family:inherit}
.qcheck.on{color:#ffd54d;text-shadow:0 0 10px rgba(255,213,77,.8)}
.qbody{flex:1;min-width:0}
.qtitle{font-size:14px;color:#e6f1ff;word-wrap:break-word}
.qtitle.done{color:#5f7ba0;text-decoration:line-through}
.qmeta{font-size:11px;color:#7d9cc4;margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-weight:800;font-size:10px;padding:1px 6px;border:1px solid;border-radius:3px;letter-spacing:.1em}
.rE{color:#9aa5b1;border-color:#9aa5b1}
.rD{color:#7ddba3;border-color:#7ddba3}
.rC{color:#5ab6ff;border-color:#5ab6ff}
.rB{color:#b98bff;border-color:#b98bff}
.rA{color:#ff8f6b;border-color:#ff8f6b}
.rS{color:#ffd54d;border-color:#ffd54d}
.xdel{background:none;border:none;color:#4a5f80;font-size:14px;padding:6px;font-family:inherit}
button.qcheck,button.xdel{min-width:44px;min-height:44px}
.fold{display:block;width:100%;text-align:left;margin-top:10px;background:none;border:none;color:#6f93c0;
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:8px 0;font-family:inherit}
.dgHead{display:flex;align-items:center;gap:8px}
.dgHead h2{margin:0;flex:1;min-width:0}
.floor{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed rgba(90,170,255,.12)}
.floor:last-of-type{border-bottom:0}
.fmark{width:18px;flex:none;text-align:center;color:#3f5a80}
.floor.cleared .fmark{color:#ffd54d}
.ftitle{flex:1;font-size:13px;color:#c9defa}
.floor.cleared .ftitle{color:#5f7ba0;text-decoration:line-through}
.floor.final .ftitle{color:#8fd0ff;font-weight:700}
.goldBig{font-size:22px;color:#ffd54d;font-weight:800;margin-bottom:10px}
.goldBig b{width:22px;height:22px;line-height:22px;font-size:12px}
.logrow{font-size:12px;color:#9cbbe0;padding:6px 0;border-bottom:1px solid rgba(90,170,255,.08)}
.logrow time{color:#5f7ba0;margin-right:8px;font-size:11px}
.train-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.train-kpi{padding:10px 8px;border:1px solid rgba(90,170,255,.2);border-radius:9px;background:rgba(30,65,110,.12);text-align:center}
.train-kpi b{display:block;font-size:20px;color:#e6f1ff;margin-bottom:3px}
.train-kpi span{font-size:9px;line-height:1.25;letter-spacing:.08em;color:#7d9cc4;text-transform:uppercase}
.train-kpi .bar{margin-top:8px;height:6px}
.train-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.train-day{padding:7px 2px;border:1px solid rgba(90,170,255,.16);border-radius:7px;text-align:center;background:rgba(30,65,110,.08)}
.train-day b{display:block;color:#8fd0ff;font-size:9px;margin-bottom:4px;text-transform:uppercase}
.train-day span{display:block;color:#9cbbe0;font-size:9px;line-height:1.2;overflow-wrap:anywhere}
.train-plan{border:1px solid rgba(90,170,255,.18);border-radius:10px;padding:11px;margin-top:10px;background:rgba(15,30,55,.35)}
.train-plan.next{border-color:rgba(255,213,77,.48);box-shadow:0 0 14px rgba(255,213,77,.08)}
.train-plan-head{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.train-plan-head strong{flex:1;color:#e6f1ff;font-size:14px}
.train-exercise{padding:7px 0;border-bottom:1px dashed rgba(90,170,255,.14)}
.train-exercise:last-child{border-bottom:0}
.train-exercise b{display:block;font-size:12px;color:#cfe4ff;font-weight:650}
.train-exercise span{display:block;font-size:10px;color:#6f8cb0;line-height:1.45;margin-top:2px}
.train-actions{display:flex;gap:8px;margin-top:12px}
.train-actions .btn{flex:1;text-align:center;padding-left:8px;padding-right:8px;letter-spacing:.08em}
.train-session{border-top:1px solid rgba(90,170,255,.14);padding:11px 0}
.train-session:first-of-type{border-top:0}
.train-session-head{display:flex;gap:8px;align-items:flex-start}
.train-session-main{flex:1;min-width:0}
.train-session-title{font-size:14px;color:#e6f1ff}
.train-session-meta{font-size:11px;color:#7d9cc4;margin-top:4px;line-height:1.45}
.train-session details{margin-top:7px;color:#9cbbe0;font-size:11px}
.train-session summary{min-height:36px;display:flex;align-items:center;color:#8fd0ff;cursor:pointer}
.train-result{padding:5px 0;border-bottom:1px dashed rgba(90,170,255,.12);line-height:1.45}
.train-result:last-child{border-bottom:0}
.train-note{font-size:11px;color:#9cbbe0;line-height:1.5;margin-top:7px;white-space:pre-wrap}
.train-form-block{border-top:1px solid rgba(90,170,255,.16);padding-top:10px;margin-top:12px}
.train-form-block strong{display:block;color:#dcecff;font-size:13px;margin-bottom:2px}
.train-form-block .muted{margin-bottom:7px}
.train-form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.train-form-grid label.f{margin-top:8px;letter-spacing:.08em}
.train-form-grid input{padding:9px 7px}
.source-links a{color:#8fd0ff;text-decoration:none}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;max-width:520px;margin:0 auto;
  background:rgba(6,10,20,.95);border-top:1px solid rgba(90,170,255,.25);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:6px 4px calc(8px + env(safe-area-inset-bottom))}
.tabbar button{flex:1;background:none;border:none;color:#5f7fa8;font-size:9px;letter-spacing:.05em;padding:6px 2px;font-family:inherit;overflow-wrap:anywhere}
.tabbar button .ti{display:block;font-size:18px;margin-bottom:3px}
.tabbar button.on{color:#8fd0ff;text-shadow:0 0 10px rgba(90,180,255,.7)}
.toast{position:fixed;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-20px);opacity:0;z-index:60;
  width:min(92vw,420px);pointer-events:none;transition:all .3s ease}
.toast.show{opacity:1;transform:translate(-50%,0)}
.sys-head{color:#7fc4ff;font-size:10px;letter-spacing:.35em;margin-bottom:5px;font-weight:700}
.toast .msg{font-size:13px;color:#e8f3ff;line-height:1.4}
.overlay{position:fixed;inset:0;background:rgba(2,4,10,.82);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:calc(16px + env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom));overflow-y:auto}
.overlay.hidden{display:none}
.modal{width:100%;max-width:420px;margin:auto 0;max-height:calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));overflow-y:auto}
.askText{font-size:14px;line-height:1.5;color:#c9defa}
label.f{display:block;font-size:10px;letter-spacing:.2em;color:#7fa6d4;margin:12px 0 5px;text-transform:uppercase}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;background:rgba(10,18,34,.9);border:1px solid rgba(90,170,255,.4);
  color:#e8f3ff;padding:10px;font-size:16px;border-radius:3px;font-family:inherit}
textarea{min-height:110px;resize:vertical}
.m-btns{display:flex;gap:10px;margin-top:16px}
.m-btns .btn{flex:1;text-align:center}

/* ---------- монохромная тема ---------- */
:root{
  color-scheme:dark;
  --bw-bg:#000;
  --bw-surface:#090909;
  --bw-surface-raised:#111;
  --bw-line:#303030;
  --bw-line-strong:#666;
  --bw-text:#f5f5f5;
  --bw-secondary:#b8b8b8;
  --bw-muted:#858585;
  --bw-dim:#5f5f5f;
}
body{background:var(--bw-bg) radial-gradient(1000px 500px at 50% -12%,#191919 0%,#000 62%);color:var(--bw-text)}
header{background:rgba(0,0,0,.9);border-bottom-color:var(--bw-line)}
.logo,.gold,.goldBig,.titleLine,.fs{color:#fff;text-shadow:none}
.gold b,.goldBig b{border-color:#777}
.panel,.train-plan,.train-kpi,.train-day{background:linear-gradient(180deg,var(--bw-surface-raised),var(--bw-surface));border-color:var(--bw-line);box-shadow:0 8px 24px rgba(0,0,0,.45)}
.panel.danger,.panel.hiddenq,.train-plan.next{border-color:var(--bw-line-strong);box-shadow:none}
.panel.danger h2,.panel.hiddenq h2,h2{color:#e8e8e8;text-shadow:none}
.muted,.empty,.pen,.stLvl,.statName,.xprow,.col span,.col b,.qmeta,.logrow time,.train-kpi span,.train-day span,.train-exercise span,.train-session-meta,.train-note,label.f{color:var(--bw-muted)}
.logrow,.train-session details{color:var(--bw-secondary)}
.stName,.statVal,.todayRow,.todayRow b,.qtitle,.ftitle,.train-kpi b,.train-plan-head strong,.train-exercise b,.train-session-title,.train-form-block strong,.askText,.toast .msg{color:var(--bw-text)}
.btn{background:#111;border-color:#707070;color:#f2f2f2;box-shadow:none}
.btn:active{background:#292929}
.btn.primary{background:#f2f2f2;border-color:#fff;color:#000;box-shadow:none}
.btn:disabled{opacity:.3}
.bar{background:#111;border-color:#333}
.bar i,.colbar i{background:linear-gradient(90deg,#777,#f5f5f5);box-shadow:none}
.rankBox{background:#0d0d0d!important;border-color:#777!important;color:#fff!important}
.chip,.chip.cf{border-color:#555;color:#bdbdbd;background:#0d0d0d;box-shadow:none}
.chip.on,.chip.cf.on{color:#000;border-color:#fff;background:#fff;box-shadow:none}
.qcheck{color:#aaa}
.qcheck.on,.floor.cleared .fmark{color:#fff;text-shadow:none}
.qtitle.done,.floor.cleared .ftitle{color:#666}
.badge,.rE,.rD,.rC,.rB,.rA,.rS{color:#d8d8d8;border-color:#777}
.rS{color:#fff;border-color:#fff}
.xdel,.fmark{color:#666}
.fold,.floor.final .ftitle,.train-day b,.train-session summary,.source-links a{color:#d6d6d6}
.fs{color:#fff}
.qitem,.floor,.colbar,.logrow,.train-exercise,.train-session,.train-result,.train-form-block{border-color:#282828}
.tabbar{background:rgba(0,0,0,.96);border-top-color:#333}
.tabbar button{color:#777}
.tabbar button.on{color:#fff;text-shadow:none}
.toast .panel{background:#0b0b0b;border-color:#777}
.sys-head{color:#aaa}
.overlay{background:rgba(0,0,0,.9)}
input[type=text],input[type=number],input[type=date],select,textarea{background:#080808;border-color:#555;color:#fff}
input::placeholder,textarea::placeholder{color:#666}
:focus-visible{outline:2px solid #fff;outline-offset:2px}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
@media (max-width:350px){
  .train-summary{grid-template-columns:1fr}.train-days{grid-template-columns:repeat(4,1fr)}
}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">ЛИЧНЫЙ ПЛАН</div>
    <div class="gold" id="goldTop"><b>Б</b> 0</div>
  </header>
  <main id="view"></main>
</div>

<nav class="tabbar">
  <button data-tab="status"><span class="ti">◈</span>Обзор</button>
  <button data-tab="quests"><span class="ti">✓</span>Задачи</button>
  <button data-tab="training"><span class="ti">▲</span>Тренировки</button>
  <button data-tab="gates"><span class="ti">▣</span>Проекты</button>
  <button data-tab="more"><span class="ti">≡</span>Ещё</button>
</nav>

<div class="toast" id="toast">
  <div class="panel" style="margin:0">
    <div class="sys-head">ЛИЧНЫЙ ПЛАН</div>
    <div class="msg" id="toastMsg"></div>
  </div>
</div>

<div id="overlay" class="overlay hidden"></div>

<input type="file" id="fileB" hidden accept=".json,application/json">
<input type="file" id="fileP" hidden accept=".json,application/json">

<script>
(function(){
"use strict";
const KEY='soloSystemV1';
const PREV_KEY='soloSystemBeforeRestoreV1';
const SCHEMA_VERSION=5;
const $=s=>document.querySelector(s);
const DIFFS={
  E:{xp:15,gold:10,label:'Очень простая'},D:{xp:30,gold:20,label:'Простая'},
  C:{xp:60,gold:40,label:'Средняя'},B:{xp:120,gold:80,label:'Сложная'},
  A:{xp:250,gold:160,label:'Большая'},S:{xp:500,gold:320,label:'Долгосрочная'}
};
const DIFF_ORDER=['E','D','C','B','A','S'];
const STATS={str:'ФИЗИЧЕСКАЯ ФОРМА',int:'ОБУЧЕНИЕ',car:'РАБОТА',vit:'ЗДОРОВЬЕ',cha:'ОТНОШЕНИЯ',wil:'САМООРГАНИЗАЦИЯ',fin:'ФИНАНСЫ'};
const TRAINING_TYPES={strength:'Силовая',run:'Бег',walk:'Ходьба'};
const EFFORTS={easy:'Легко',moderate:'Умеренно',hard:'Тяжело'};
const STRENGTH_PLANS={
  A:{title:'Full Body A',exercises:[
    {id:'a-squat',title:'Присед',target:'2×8–12',sets:2,reps:8,max:12,options:['Присед к стулу','Гоблет-присед','Присед со штангой']},
    {id:'a-push',title:'Горизонтальный жим',target:'2×8–12',sets:2,reps:8,max:12,options:['Отжимание от высокой опоры','Отжимание от пола','Жим гантелей лёжа','Жим штанги лёжа']},
    {id:'a-row',title:'Горизонтальная тяга',target:'2×8–12',sets:2,reps:8,max:12,options:['Тяга резинки к поясу','Тяга гантели к поясу','Тяга горизонтального блока']},
    {id:'a-hinge',title:'Наклон / тяга',target:'2×8–12',sets:2,reps:8,max:12,options:['Наклон с резинкой','Румынская тяга с гантелями','Румынская тяга со штангой']},
    {id:'a-core',title:'Корпус',target:'2×6–10 на сторону',sets:2,reps:6,options:['Dead bug','Bird dog']}

const isObj=v=>!!v&&typeof v==='object'&&!Array.isArray(v);
const finite=(v,fallback,min,max)=>{

    .replace(/боссов/g,'главных задач').replace(/босса/g,'главную задачу').replace(/босс/g,'итоговый этап')
    .replace(/Врата/gi,'Проект').replace(/врат/gi,'проектов')

    .replace(/этажи/g,'этапы').replace(/этажа/g,'этапа').replace(/этаж/g,'этап')

    .replace(/Охотник/gi,'Пользователь').replace(/охотника/gi,'профиля')

}
const isDateKey=v=>typeof v==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(v);
function normalize(saved){
  const base=seed(),src=isObj(saved)?saved:{};
  const seen=new Set();
  const idOf=v=>{
    let id=typeof v==='string'&&/^[A-Za-z0-9_-]{1,100}$/.test(v)?v:uid();
    while(seen.has(id))id=uid();
    seen.add(id);return id;
  };
  const arr=(v,max=LIMITS.items)=>Array.isArray(v)?v.slice(0,max):[];
  const hunter=isObj(src.hunter)?src.hunter:{};
  const s={
    v:SCHEMA_VERSION,
    hunter:{
      name:(()=>{const n=neutralText(hunter.name,base.hunter.name,24);return n||base.hunter.name;})(),
      level:finite(hunter.level,base.hunter.level,1,10000),
      xp:finite(hunter.xp,base.hunter.xp,0,1e12),
      gold:finite(hunter.gold,base.hunter.gold,0,1e12)
    },
    stats:{},dailies:[],quests:[],dungeons:[],shop:[],log:[],applied:[],training:trainingSeed(),
    lastDay:isDateKey(src.lastDay)?src.lastDay:today(),

    restDay:isDateKey(src.restDay)?src.restDay:null,
    titles:[],activeTitle:null,history:{},penalty:null,weeklyBoss:null,hiddenDay:null,
    focus:[],done:{quests:0,dungeons:0,buys:0,bestStreak:0,bosses:0,hidden:0}
  };
  Object.keys(STATS).forEach(k=>s.stats[k]=finite(isObj(src.stats)?src.stats[k]:undefined,base.stats[k],0,1e9));
  s.dailies=arr(src.dailies).filter(isObj).map(d=>({
    id:idOf(d.id),title:neutralText(d.title,'Без названия',240)||'Без названия',
    stat:STATS[d.stat]?d.stat:'wil',done:d.done===true
  }));
  s.quests=arr(src.quests).filter(isObj).map(q=>{
    const out={id:idOf(q.id),title:neutralText(q.title,'Без названия',240)||'Без названия',
      stat:STATS[q.stat]?q.stat:'wil',diff:DIFFS[q.diff]?q.diff:'D',done:q.done===true};
    if(Number.isFinite(Number(q.doneAt)))out.doneAt=finite(q.doneAt,0,0,Number.MAX_SAFE_INTEGER);
    return out;
  });
  s.dungeons=arr(src.dungeons).filter(isObj).map(dg=>{
    const floors=arr(dg.floors,LIMITS.floors).map(f=>isObj(f)?f:{title:f,cleared:false}).map(f=>({
      title:neutralText(f.title,'Этап',240)||'Этап',cleared:f.cleared===true
    }));
    return {id:idOf(dg.id),title:neutralText(dg.title,'Проект',240)||'Проект',
      diff:DIFFS[dg.diff]?dg.diff:'D',stat:STATS[dg.stat]?dg.stat:null,
      cleared:floors.length>0&&floors.every(f=>f.cleared),floors:floors.length?floors:[{title:'Итоговый этап',cleared:false}]};
  });
  s.shop=arr(src.shop).filter(isObj).map(it=>({
    id:idOf(it.id),title:neutralText(it.title,'Награда',240)||'Награда',
    cost:finite(it.cost,50,1,1e9),
    kind:it.kind==='restDay'||neutralText(it.title,'',240)==='День без задач (без потери серии)'?'restDay':null
  }));
  s.log=arr(src.log,LIMITS.log).filter(isObj).map(l=>({
    t:finite(l.t,Date.now(),0,Number.MAX_SAFE_INTEGER),m:neutralText(l.m,'Событие',500)||'Событие'
  }));
  const applied=new Set();
  arr(src.applied,LIMITS.applied).forEach(v=>{const x=cleanText(v,'',240);if(x)applied.add(x);});
  s.applied=Array.from(applied);
  const knownTitles=new Set(TITLES.map(t=>t.id));
  s.titles=arr(src.titles,TITLES.length).filter(id=>knownTitles.has(id)).filter((id,i,a)=>a.indexOf(id)===i);
  s.activeTitle=s.titles.indexOf(src.activeTitle)>=0?src.activeTitle:null;
  const focus=arr(src.focus,3).filter(k=>STATS[k]).filter((k,i,a)=>a.indexOf(k)===i);
  s.focus=Array.isArray(src.focus)?focus:base.focus.slice();
  if(isObj(src.history))Object.keys(src.history).filter(isDateKey).sort().slice(-60).forEach(k=>s.history[k]=finite(src.history[k],0,0,100000));
  if(isObj(src.done))Object.keys(s.done).forEach(k=>s.done[k]=finite(src.done[k],0,0,1e9));
  if(isObj(src.weeklyBoss)&&typeof src.weeklyBoss.title==='string')s.weeklyBoss={
    title:neutralText(src.weeklyBoss.title,'Главная задача недели',240),week:isDateKey(src.weeklyBoss.week)?src.weeklyBoss.week:today(),done:src.weeklyBoss.done===true
  };
  if(s.weeklyBoss&&s.weeklyBoss.title){
    const legacy={id:idOf('legacy-weekly-'+s.weeklyBoss.week.replace(/[^0-9-]/g,'')),title:s.weeklyBoss.title,
      stat:'wil',diff:'A',done:s.weeklyBoss.done};
    if(legacy.done)legacy.doneAt=Date.now();

  }
  if(isObj(src.hiddenDay))s.hiddenDay={
    date:isDateKey(src.hiddenDay.date)?src.hiddenDay.date:today(),idx:finite(src.hiddenDay.idx,0,0,HIDDEN_POOL.length-1),done:src.hiddenDay.done===true
  };
  const tr=isObj(src.training)?src.training:{};

  s.training.sessions=arr(tr.sessions,LIMITS.trainingSessions).filter(isObj).map(item=>{
    const type=TRAINING_TYPES[item.type]?item.type:null;if(!type)return null;
    const runLevel=finite(item.runLevel,s.training.runLevel,1,RUN_LEVELS.length);
    const walkType=WALK_TYPES[item.walkType]?item.walkType:'recovery';
    const fallbackDuration=type==='strength'?45:type==='run'?RUN_LEVELS[runLevel-1].duration:WALK_TYPES[walkType].duration;
    const session={
      id:idOf(item.id),type,date:isDateKey(item.date)?item.date:today(),
      at:finite(item.at,Date.now(),0,Number.MAX_SAFE_INTEGER),
      duration:finite(item.duration,fallbackDuration,1,1440),
      distance:decimal(item.distance,0,0,1000,2),steps:finite(item.steps,0,0,200000),
      effort:EFFORTS[item.effort]?item.effort:'moderate',note:cleanText(item.note,'',500),
      variant:item.variant==='B'?'B':'A',runLevel,walkType,
      planText:cleanText(item.planText,'',500),exercises:[]
    };

      slot:cleanText(ex.slot,'exercise',60)||'exercise',name:cleanText(ex.name,'Упражнение',120)||'Упражнение',
      sets:finite(ex.sets,1,1,20),reps:finite(ex.reps,1,1,300),load:decimal(ex.load,0,0,1000,2)
    }));
    return session;
  }).filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date)||b.at-a.at);
  return s;
}
function validateBackup(obj){
  if(!isObj(obj))return {ok:false,error:'Файл не содержит объект данных'};
  if(!isObj(obj.hunter)||!isObj(obj.stats))return {ok:false,error:'Повреждены данные профиля или категорий'};
  for(const k of ['level','xp','gold'])if(!Number.isFinite(obj.hunter[k]))return {ok:false,error:'Некорректное числовое поле hunter.'+k};
  for(const k of Object.keys(STATS))if(!Number.isFinite(obj.stats[k]))return {ok:false,error:'Некорректная характеристика '+k};
  for(const k of ['dailies','quests','dungeons','shop']){
    if(!Array.isArray(obj[k]))return {ok:false,error:'Раздел '+k+' должен быть массивом'};
    if(obj[k].length>LIMITS.items)return {ok:false,error:'Слишком много записей в разделе '+k};
  }
  if(obj.dailies.some(x=>!isObj(x)||typeof x.title!=='string')||obj.quests.some(x=>!isObj(x)||typeof x.title!=='string'))return {ok:false,error:'Повреждён список задач'};
  if(obj.dungeons.some(x=>!isObj(x)||typeof x.title!=='string'||!Array.isArray(x.floors)||x.floors.length>LIMITS.floors))return {ok:false,error:'Повреждён список проектов'};
  if(obj.shop.some(x=>!isObj(x)||typeof x.title!=='string'||!Number.isFinite(x.cost)))return {ok:false,error:'Повреждён список наград'};
  if(obj.training!==undefined&&!isObj(obj.training))return {ok:false,error:'Повреждён раздел тренировок'};
  return {ok:true,state:normalize(obj)};
}

/* ---------- совместимость старого прогресса ---------- */
function addXP(n){
  const h=S.hunter;
  h.xp+=n;let up=false;
  while(h.xp>=xpNeed(h.level)){h.xp-=xpNeed(h.level);h.level++;up=true;}
  if(up)log('Обновлён общий прогресс');
  return n;
}

/* ---------- смена дня и недели ---------- */
function calendarGap(from,to){
  if(!isDateKey(from)||!isDateKey(to))return 1;
  const a=from.split('-').map(Number),b=to.split('-').map(Number);
  return Math.round((Date.UTC(b[0],b[1]-1,b[2])-Date.UTC(a[0],a[1]-1,a[2]))/86400000);
}
function checkDailyReset(){
  const t=today();let changed=false;
  if(S.lastDay!==t){
    const prev=S.lastDay,gap=calendarGap(prev,t);
    const had=S.dailies.length>0;
    const all=had&&S.dailies.every(d=>d.done);
    const restProtected=S.restDay===prev&&gap===1;
    const missed=!!prev&&(gap>1||(had&&!all));
    if(restProtected){
      log('Использован день отдыха с сохранением серии ('+prev+')');
      sysMsg('ДЕНЬ ОТДЫХА ЗАВЕРШЁН. Серия сохранена.');
    }else if(missed){
      if(S.streak>0)sysMsg('Ежедневный план не завершён. Серия начнётся заново.');
      S.streak=0;
      log(gap>1?'Серия прервана: пропущено дней — '+(gap-1):'Серия прервана ('+prev+')');
    }
    S.dailies.forEach(d=>d.done=false);
    S.bonusDay=null;
    S.restDay=null;
    S.lastDay=t;
    changed=true;
  }
  if(!S.hiddenDay||S.hiddenDay.date!==t){
    S.hiddenDay={date:t,idx:dayHash(t+'h')%HIDDEN_POOL.length,done:false};
    changed=true;
  }
  if(changed)save();
  return changed;
}
let rolloverTimer=null;
function scheduleRollover(){
  clearTimeout(rolloverTimer);
  const now=new Date(),next=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,1);
  rolloverTimer=setTimeout(()=>{checkDailyReset();render();scheduleRollover();},Math.max(1000,next-now));
}
function finishDailySet(){
  if(!S.dailies.length||!S.dailies.every(x=>x.done)||S.bonusDay===today())return null;
  S.bonusDay=today();S.streak++;
  if(S.streak>S.done.bestStreak)S.done.bestStreak=S.streak;
  S.hunter.gold+=20;
  addXP(40);
  log('Все ежедневные задачи выполнены. Серия: '+S.streak);
  return {gold:20};
}

/* ---------- действия ---------- */
function doDaily(id){
  const d=S.dailies.find(x=>x.id===id);
  if(!d||d.done)return;
  const m=isFocus(d.stat)?2:1;
  d.done=true;
  S.stats[d.stat]=(S.stats[d.stat]||0)+m;
  S.hunter.gold+=5;
  bump();
  addXP(10*m);
  log('Ежедневная задача: '+d.title);
  const bonus=finishDailySet();
  if(bonus){
    sysMsg('ПЛАН ДНЯ ЗАВЕРШЁН. +25 баллов. Серия: '+S.streak+' дн.');
  }else{
    sysMsg('+5 баллов, +'+m+' в категории «'+STATS[d.stat]+'»'+(m>1?' · ПРИОРИТЕТ ×2':''));
  }
  save();render();
}
function doQuest(id){
  const q=S.quests.find(x=>x.id===id);
  if(!q||q.done)return;
  const r=DIFFS[q.diff]||DIFFS.E;
  const m=isFocus(q.stat)?2:1;
  q.done=true;q.doneAt=Date.now();
  S.stats[q.stat]=(S.stats[q.stat]||0)+2*m;
  S.hunter.gold+=r.gold;
  S.done.quests++;
  bump();
  addXP(r.xp*m);
  log('Задача выполнена: '+q.title+' · '+r.label);
  sysMsg('ЗАДАЧА ВЫПОЛНЕНА: +'+r.gold+' баллов · +'+(2*m)+' отметки в категории «'+STATS[q.stat]+'»');
  save();render();
}
function doFloor(dgId){
  const dg=S.dungeons.find(x=>x.id===dgId);
  if(!dg||dg.cleared)return;
  const f=dg.floors.find(x=>!x.cleared);
  if(!f)return;
  f.cleared=true;
  const r=DIFFS[dg.diff]||DIFFS.E;
  const m=dg.stat&&isFocus(dg.stat)?2:1;
  const fx=Math.max(5,Math.round(r.xp/2))*m;
  if(dg.stat&&STATS[dg.stat])S.stats[dg.stat]=(S.stats[dg.stat]||0)+m;
  bump();
  addXP(fx);
  log('Этап завершён: '+f.title+' ('+dg.title+')');
  if(dg.floors.every(x=>x.cleared)){
    dg.cleared=true;
    S.done.dungeons++;
    S.hunter.gold+=r.gold*2;
    if(dg.stat&&STATS[dg.stat])S.stats[dg.stat]=(S.stats[dg.stat]||0)+3*m;
    addXP(r.xp*2*m);
    sysMsg('ПРОЕКТ ЗАВЕРШЁН: '+dg.title+'. +'+(r.gold*2)+' баллов');
    log('Проект завершён: '+dg.title);
  }else{
    sysMsg('Этап завершён: '+f.title);
  }
  save();render();
}

function applyPack(p){
  if(!p||typeof p!=='object')return 0;
  let n=0;
  const take=(arr,src,norm)=>{
    if(!Array.isArray(src))return;
    src.slice(0,LIMITS.items).forEach(it=>{
      if(!it||typeof it.id!=='string'||!it.id.trim())return;
      const pid=cleanText(it.id,'',240);
      if(!pid)return;
      if(S.applied.indexOf(pid)>=0)return;
      const o=norm(it);
      if(!o)return;
      arr.push(o);if(S.applied.length>=LIMITS.applied)S.applied.shift();S.applied.push(pid);n++;
    });
  };
  take(S.dailies,p.dailies,it=>{const title=neutralText(it.title,'',240);return title?{id:uid(),title,stat:STATS[it.stat]?it.stat:'wil',done:false}:null;});
  take(S.quests,p.quests,it=>{const title=neutralText(it.title,'',240);return title?{id:uid(),title,stat:STATS[it.stat]?it.stat:'wil',diff:DIFFS[it.diff]?it.diff:'D',done:false}:null;});
  take(S.dungeons,p.dungeons,it=>{
    if(!it||!it.title||!Array.isArray(it.floors)||!it.floors.length)return null;
    const title=neutralText(it.title,'',240);
    const floors=it.floors.slice(0,LIMITS.floors).map(f=>neutralText((f&&f.title)||f,'',240)).filter(Boolean);
    return title&&floors.length?{id:uid(),title,diff:DIFFS[it.diff]?it.diff:'D',stat:STATS[it.stat]?it.stat:null,cleared:false,
      floors:floors.map(title=>({title,cleared:false}))}:null;
  });
  take(S.shop,p.shop,it=>{const title=neutralText(it.title,'',240);return title?{id:uid(),title,cost:finite(it.cost,50,1,1e9),kind:it.kind==='restDay'?'restDay':null}:null;});
  if(n){log('Загружен пакет: +'+n+' записей');save();render();}
  return n;
}
function contentSync(manual){
  fetch('content.json?t='+Date.now(),{cache:'no-store'})
    .then(r=>r.ok?r.json():null)
    .then(p=>{
      if(!p){if(manual)sysMsg('content.json не найден');return;}
      const n=applyPack(p);
      if(manual)sysMsg(n?('Обновление контента: +'+n+' записей'):'Новых записей нет');
      else if(n)sysMsg('С ПК загружено новых записей: '+n);
    })
    .catch(()=>{if(manual)sysMsg('Нет сети — офлайн-режим');});
}

/* ---------- тренировки ---------- */
function trainingSessions(){
  return [...S.training.sessions].sort((a,b)=>b.date.localeCompare(a.date)||b.at-a.at);
}
function weekBounds(){
  const start=new Date();start.setHours(12,0,0,0);
  start.setDate(start.getDate()-((start.getDay()+6)%7));
  const end=new Date(start);end.setDate(end.getDate()+6);
  return {start:dateKey(start),end:dateKey(end)};
}
function trainingWeekStats(){
  const bounds=weekBounds();
  const items=S.training.sessions.filter(x=>x.date>=bounds.start&&x.date<=bounds.end);
  return {
    strength:items.filter(x=>x.type==='strength').length,
    run:items.filter(x=>x.type==='run').length,
    walk:items.filter(x=>x.type==='walk').length,
    minutes:items.reduce((n,x)=>n+x.duration,0),
    runKm:decimal(items.filter(x=>x.type==='run').reduce((n,x)=>n+x.distance,0),0,0,10000,2),
    walkKm:decimal(items.filter(x=>x.type==='walk').reduce((n,x)=>n+x.distance,0),0,0,10000,2)
  };
}
function dateLabel(key){
  if(!isDateKey(key))return key;
  const p=key.split('-');return p[2]+'.'+p[1]+'.'+p[0];
}
function paceLabel(duration,distance){
  if(!(duration>0)||!(distance>0))return '';
  const seconds=Math.round(duration*60/distance),m=Math.floor(seconds/60),s=seconds%60;
  return m+':'+String(s).padStart(2,'0')+' мин/км';
}
function latestStrengthResult(variant,slot){
  for(const session of trainingSessions()){
    if(session.type!=='strength'||session.variant!==variant)continue;
    const ex=session.exercises.find(x=>x.slot===slot);if(ex)return ex;
  }
  return null;
}
function strengthProgressHint(variant,definition){
  if(!definition.max)return '';
  const results=[];
  for(const session of trainingSessions()){
    if(session.type!== 'strength'||session.variant!==variant)continue;
    const ex=session.exercises.find(x=>x.slot===definition.id);if(ex)results.push(ex);
    if(results.length===2)break;
  }
  if(results.length<2||results[0].name!==results[1].name||results[0].load!==results[1].load)return '';
  if(results.every(x=>x.sets>=definition.sets&&x.reps>=definition.max))return 'Два раза достигнута верхняя граница — можно немного увеличить вес или сложность варианта.';
  return '';
}
function effortOpts(selected){
  return Object.keys(EFFORTS).map(k=>'<option value="'+k+'"'+(k===selected?' selected':'')+'>'+EFFORTS[k]+'</option>').join('');
}

    Object.keys(STATS).map(k=>{
      const v=S.stats[k]||0;const w=Math.round(v/maxStat*100);
      return '<div class="statRow"><span class="statName">'+(isFocus(k)?'<i class="fs">★</i>':'')+STATS[k]+'</span>'+
        '<div class="bar"><i style="width:'+w+'%"></i></div>'+
        '<span class="statVal">'+v+'</span></div>';
    }).join('')+'</div>'+
    '<div class="panel"><h2>Приоритетные категории</h2><div class="chips">'+
    Object.keys(STATS).map(k=>'<button class="chip cf'+(isFocus(k)?' on':'')+'" data-act="setfocus" data-id="'+k+'">'+STATS[k]+'</button>').join('')+
    '</div><div class="muted sec-note">Можно выбрать до трёх категорий. Выполненные дела в них дают вдвое больше отметок категории.</div></div>'+
    activityChart()+
    '<div class="panel"><h2>Вехи · '+S.titles.length+'/'+TITLES.length+'</h2>'+
    (S.titles.length
      ?'<div class="chips">'+S.titles.map(id=>{
          const t=TITLES.find(x=>x.id===id);if(!t)return '';
          return '<span class="chip on">'+t.name+'</span>';
        }).join('')+'</div><div class="muted sec-note">Вехи открываются автоматически по мере выполнения планов.</div>'
      :'<div class="empty">Первая веха откроется после завершения первой задачи.</div>')+
    '</div>'+
    '<div class="panel"><h2>Сегодня</h2>'+
    '<div class="todayRow"><span>Ежедневные задачи</span><b>'+doneD+' / '+S.dailies.length+'</b></div>'+
    '<div class="todayRow"><span>Дополнительная задача</span><b>'+(S.hiddenDay&&S.hiddenDay.done?'выполнена':'доступна')+'</b></div>'+
    '<div class="todayRow"><span>Активные задачи</span><b>'+activeQ+'</b></div>'+
    '<div class="todayRow"><span>Проекты в работе</span><b>'+activeDg+'</b></div>'+
    '<div class="todayRow"><span>Тренировки за неделю</span><b>'+tw.strength+' сил. · '+tw.run+' бег · '+tw.walk+' ходьба</b></div>'+
    (S.restDay===today()?'<div class="todayRow" style="color:#fff"><span>День отдыха</span><b style="color:#fff">активирован</b></div>':'')+
    '<div class="muted sec-note">За выполненные задачи начисляются баллы для магазина наград. Если ежедневный план не закрыт до полуночи, серия начинается заново.</div>'+
    '</div>';
}
function questRow(q,done){
  const r=DIFFS[q.diff]||DIFFS.E;
  return '<div class="qitem">'+
    '<button class="qcheck '+(done?'on':'')+'" aria-label="'+(done?'Задача выполнена':'Выполнить задачу')+'" '+(done?'disabled':'')+' data-act="quest" data-id="'+q.id+'">'+(done?'◆':'◇')+'</button>'+
    '<div class="qbody"'+(done?'':' data-act="editq" data-id="'+q.id+'"')+'><div class="qtitle '+(done?'done':'')+'">'+esc(q.title)+'</div>'+
    '<div class="qmeta"><span class="badge r'+q.diff+'">'+r.label+'</span><span>'+(STATS[q.stat]||'')+'</span>'+
    '<span>+'+r.gold+' баллов</span>'+
    (isFocus(q.stat)?'<span class="badge rS">ПРИОРИТЕТ</span>':'')+'</div></div>'+
    '<button class="xdel" aria-label="Удалить задачу" data-act="delq" data-id="'+q.id+'">✕</button></div>';
}
function renderQuests(){
  const allAct=S.quests.filter(q=>!q.done),allFin=S.quests.filter(q=>q.done);
  const matches=q=>ui.taskFilter==='all'||q.stat===ui.taskFilter;
  const act=allAct.filter(matches),fin=allFin.filter(matches);
  const doneD=S.dailies.filter(d=>d.done).length;
  let html='';
  const hd=S.hiddenDay;
  if(hd){
    const tpl=HIDDEN_POOL[hd.idx];
    html+='<div class="panel hiddenq"><h2>Дополнительная задача дня</h2>'+
      (hd.done
        ?'<div class="qitem"><span class="qcheck on">◆</span>'+
         '<div class="qbody"><div class="qtitle done">'+esc(tpl.title)+'</div>'+
         '<div class="qmeta"><span>Выполнено. Новый появится завтра.</span></div></div></div>'
        :'<div class="qitem"><button class="qcheck" aria-label="Выполнить дополнительную задачу" data-act="hiddenq">◇</button>'+
         '<div class="qbody"><div class="qtitle">'+esc(tpl.title)+'</div>'+
         '<div class="qmeta"><span>'+STATS[tpl.stat]+'</span><span>+'+(DIFFS.D.gold*2)+' баллов</span></div></div></div>')+
      '</div>';
  }
  html+='<div class="panel"><h2>Ежедневные задачи · '+doneD+'/'+S.dailies.length+'</h2>'+
    (S.dailies.map(d=>'<div class="qitem">'+
      '<button class="qcheck '+(d.done?'on':'')+'" aria-label="'+(d.done?'Ежедневная задача выполнена':'Выполнить ежедневную задачу')+'" data-act="daily" data-id="'+d.id+'">'+(d.done?'◆':'◇')+'</button>'+
      '<div class="qbody"'+(d.done?'':' data-act="editdaily" data-id="'+d.id+'"')+'><div class="qtitle '+(d.done?'done':'')+'">'+esc(d.title)+'</div>'+
      '<div class="qmeta"><span>'+(STATS[d.stat]||'')+'</span><span>+5 баллов</span>'+
      (isFocus(d.stat)?'<span class="badge rS">ПРИОРИТЕТ</span>':'')+'</div></div>'+
      '<button class="xdel" aria-label="Удалить ежедневную задачу" data-act="deldaily" data-id="'+d.id+'">✕</button></div>').join('')||'<div class="empty">Ежедневных задач пока нет</div>')+
    '<button class="btn block" data-act="addDaily">+ Ежедневная задача</button>'+
    '<div class="muted sec-note">Список обновляется в полночь. За весь план дня начисляется ещё 20 баллов и продолжается серия.</div></div>';
  html+='<div class="panel"><h2>Задачи · '+act.length+(ui.taskFilter==='all'?'':' из '+allAct.length)+'</h2>'+
    '<div class="chips" role="group" aria-label="Фильтр задач по категории">'+
    '<button class="chip'+(ui.taskFilter==='all'?' on':'')+'" aria-pressed="'+(ui.taskFilter==='all')+'" data-act="taskfilter" data-id="all">ВСЕ</button>'+
    Object.keys(STATS).map(k=>'<button class="chip'+(ui.taskFilter===k?' on':'')+'" aria-pressed="'+(ui.taskFilter===k)+'" data-act="taskfilter" data-id="'+k+'">'+STATS[k]+'</button>').join('')+'</div>'+
    (act.map(q=>questRow(q,false)).join('')||'<div class="empty">В этой категории активных задач нет</div>')+
    '<button class="btn block" data-act="addQuest">+ Новая задача</button>'+
    (fin.length?'<button class="fold" data-act="foldDone">'+(ui.showDone?'▾':'▸')+' Выполненные ('+fin.length+')</button>'+
      (ui.showDone?fin.map(q=>questRow(q,true)).join(''):''):'')+
    '</div>';
  return html;
}
function dungeonCard(dg){
  const total=dg.floors.length,cl=dg.floors.filter(f=>f.cleared).length;
  const r=DIFFS[dg.diff]||DIFFS.E;
  const curIdx=dg.floors.findIndex(f=>!f.cleared);
  return '<div class="panel"><div class="dgHead"><h2 data-act="editdun" data-id="'+dg.id+'">'+esc(dg.title)+'</h2>'+
    '<span class="badge r'+dg.diff+'">'+r.label+'</span>'+
    '<button class="xdel" aria-label="Удалить проект" data-act="deldun" data-id="'+dg.id+'">✕</button></div>'+
    '<div class="xprow" style="margin-top:10px"><span>ЭТАПЫ</span><span>'+cl+' / '+total+'</span></div>'+
    '<div class="bar"><i style="width:'+Math.round(cl/total*100)+'%"></i></div>'+
    '<div style="margin-top:8px">'+
    dg.floors.map((f,i)=>{
      const isCur=!f.cleared&&i===curIdx;
      return '<div class="floor '+(f.cleared?'cleared':'')+'">'+
        '<span class="fmark">'+(f.cleared?'◆':'◇')+'</span>'+
        '<span class="ftitle">'+esc(f.title)+'</span>'+
        (isCur?'<button class="btn small" data-act="floor" data-id="'+dg.id+'">Завершить</button>':'')+
        '</div>';
    }).join('')+'</div>'+
    '<div class="muted sec-note">'+(dg.stat&&STATS[dg.stat]?STATS[dg.stat]+' · ':'')+
    'За завершение проекта: +'+(r.gold*2)+' баллов</div></div>';
}
function renderGates(){
  const act=S.dungeons.filter(d=>!d.cleared),fin=S.dungeons.filter(d=>d.cleared);
  return (act.map(dungeonCard).join('')||'<div class="panel"><div class="empty">Проектов в работе нет. Создай проект для результата, который требует нескольких последовательных этапов.</div></div>')+
    '<div class="panel"><button class="btn block" data-act="addDungeon">+ Новый проект</button>'+
    (fin.length?'<button class="fold" data-act="foldCleared">'+(ui.showCleared?'▾':'▸')+' Завершённые проекты ('+fin.length+')</button>'+
      (ui.showCleared?fin.map(d=>'<div class="qitem"><span class="qcheck on">◆</span>'+
        '<div class="qbody"><div class="qtitle done">'+esc(d.title)+'</div></div>'+
        '<button class="xdel" aria-label="Удалить завершённый проект" data-act="deldun" data-id="'+d.id+'">✕</button></div>').join(''):''):'')+
    '<div class="muted sec-note">Этапы выполняются по порядку. За завершение всего проекта начисляются дополнительные баллы.</div></div>';
}
function renderShop(){
  return '<div class="panel"><button class="btn block" data-act="openmore">← Назад в раздел «Ещё»</button></div>'+
    '<div class="panel"><h2>Магазин наград</h2>'+
    '<div class="goldBig"><b>Б</b> '+S.hunter.gold+' баллов</div>'+
    ([...S.shop].sort((a,b)=>a.cost-b.cost).map(it=>{const restActive=it.kind==='restDay'&&S.restDay===today();return '<div class="qitem">'+
      '<div class="qbody" data-act="editshop" data-id="'+it.id+'"><div class="qtitle">'+esc(it.title)+'</div>'+
      '<div class="qmeta"><span style="color:#fff">'+it.cost+' баллов</span>'+(it.kind==='restDay'?'<span>Сохраняет серию сегодня</span>':'')+'</div></div>'+
      '<button class="btn small" data-act="buy" data-id="'+it.id+'" '+(S.hunter.gold<it.cost||restActive?'disabled':'')+'>'+(restActive?'Активно':'Получить')+'</button>'+
      '<button class="xdel" aria-label="Удалить награду" data-act="delshop" data-id="'+it.id+'">✕</button></div>';}).join('')||'<div class="empty">Добавь награды, ради которых стоит копить баллы</div>')+
    '<button class="btn block" data-act="addShop">+ Новая награда</button>'+
    '<div class="muted sec-note">Баллы начисляются за завершённые задачи. Выбирай реальные небольшие награды, которые поддерживают привычки и не мешают целям.</div></div>';
}
function renderMore(){
  return '<div class="panel"><h2>Статистика</h2>'+
    '<div class="todayRow"><span>Задач выполнено</span><b>'+S.done.quests+'</b></div>'+
    '<div class="todayRow"><span>Проектов завершено</span><b>'+S.done.dungeons+'</b></div>'+
    '<div class="todayRow"><span>Тренировок записано</span><b>'+S.training.sessions.length+'</b></div>'+
    '<div class="todayRow"><span>Дополнительных задач</span><b>'+(S.done.hidden||0)+'</b></div>'+
    '<div class="todayRow"><span>Наград получено</span><b>'+S.done.buys+'</b></div>'+
    '<div class="todayRow"><span>Лучшая серия</span><b>'+S.done.bestStreak+' дн.</b></div>'+
    '<div class="todayRow"><span>Вех открыто</span><b>'+S.titles.length+' / '+TITLES.length+'</b></div></div>'+
    '<div class="panel"><h2>Магазин наград</h2>'+
    '<div class="todayRow"><span>Доступно</span><b>'+S.hunter.gold+' баллов</b></div>'+
    '<div class="todayRow"><span>Наград в магазине</span><b>'+S.shop.length+'</b></div>'+
    '<button class="btn block" data-act="openshop">Открыть магазин</button></div>'+
    '<div class="panel"><h2>Данные · Синхронизация</h2>'+
    '<button class="btn block" data-act="export">⇩ Экспорт бэкапа (JSON)</button>'+
    '<button class="btn block" data-act="importP">⇪ Импорт пакета задач с ПК</button>'+
    '<button class="btn block" data-act="importB">⟲ Восстановить из бэкапа</button>'+
    (hasRecoveryPoint()?'<button class="btn block" data-act="rollback">↶ Откатить последнее восстановление</button>':'')+
    '<button class="btn block" data-act="sync">⟳ Обновить контент (content.json)</button>'+
    '<div class="muted sec-note">Пакет задач — JSON-файл с новыми задачами, проектами и наградами, подготовленный на компьютере. При запуске приложение само подтягивает content.json с сервера, если есть сеть. Всё остальное работает офлайн.</div></div>'+
    '<div class="panel"><h2>Журнал</h2>'+
    (S.log.slice(0,30).map(l=>{
      const d=new Date(l.t);
      const p=n=>String(n).padStart(2,'0');
      return '<div class="logrow"><time>'+p(d.getDate())+'.'+p(d.getMonth()+1)+' '+p(d.getHours())+':'+p(d.getMinutes())+'</time>'+esc(l.m)+'</div>';
    }).join('')||'<div class="empty">Журнал пуст</div>')+'</div>'+
    '<div class="panel"><h2>Сброс данных</h2>'+
    '<button class="btn block" data-act="reset" style="border-color:#666;color:#bbb">Полный сброс</button></div>';
}

const TABS={status:renderStatus,quests:renderQuests,training:renderTraining,gates:renderGates,shop:renderShop,more:renderMore};
function render(){
  $('#goldTop').innerHTML='<b>Б</b> '+S.hunter.gold;
  const view=$('#view');
  view.innerHTML=TABS[tab]();
  if(lastTab!==tab){
    view.style.animation='none';
    void view.offsetWidth;
    view.style.animation='viewIn .25s ease';
    lastTab=tab;
  }
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
}

/* ---------- события ---------- */
document.querySelectorAll('.tabbar button').forEach(b=>{
  b.addEventListener('click',()=>{checkDailyReset();scheduleRollover();tab=b.dataset.tab;render();});
});
$('#view').addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');
  if(!t)return;
  checkDailyReset();scheduleRollover();
  const act=t.dataset.act,id=t.dataset.id;
  switch(act){
    case 'daily':doDaily(id);break;
    case 'quest':doQuest(id);break;
    case 'floor':doFloor(id);break;
    case 'hiddenq':doHidden();break;
    case 'buy':buy(id);break;
    case 'addstrength':formStrength(id);break;
    case 'addrun':formCardio('run');break;
    case 'addwalk':formCardio('walk',null,id);break;
    case 'edittraining':{
      const item=S.training.sessions.find(x=>x.id===id);if(!item)break;
      if(item.type==='strength')formStrength(item.variant,id);
      else formCardio(item.type,id,item.walkType);
      break;
    }
    case 'deltraining':deleteTraining(id);break;
    case 'trainsettings':formTrainingSettings();break;
    case 'runlevel':
      S.training.runLevel=finite(S.training.runLevel+(id==='prev'?-1:id==='next'?1:0),S.training.runLevel,1,RUN_LEVELS.length);
      save();render();break;
    case 'trainfilter':ui.trainingFilter=id==='all'||TRAINING_TYPES[id]?id:'all';render();break;
    case 'openshop':tab='shop';render();break;
    case 'openmore':tab='more';render();break;
    case 'delq':delFrom(S.quests,id,'задачу');break;
    case 'deldaily':delFrom(S.dailies,id,'ежедневную задачу');break;
    case 'deldun':delFrom(S.dungeons,id,'проект');break;
    case 'delshop':delFrom(S.shop,id,'награду');break;
    case 'addDaily':formDaily();break;
    case 'addQuest':formQuest();break;
    case 'addDungeon':formDungeon();break;
    case 'addShop':formShop();break;
    case 'editq':formEditQuest(id);break;
    case 'editdaily':formEditDaily(id);break;
    case 'editdun':formEditDungeon(id);break;
    case 'editshop':formEditShop(id);break;
    case 'taskfilter':ui.taskFilter=id==='all'||STATS[id]?id:'all';render();break;
    case 'setfocus':{
      const i=S.focus.indexOf(id);
      if(i>=0)S.focus.splice(i,1);
      else if(S.focus.length>=3){sysMsg('Максимум 3 направления в фокусе');break;}
      else S.focus.push(id);
      save();render();
      break;
    }
    case 'name':formName();break;
    case 'foldDone':ui.showDone=!ui.showDone;render();break;
    case 'foldCleared':ui.showCleared=!ui.showCleared;render();break;
    case 'export':exportData();break;
    case 'importB':$('#fileB').click();break;
    case 'importP':$('#fileP').click();break;
    case 'rollback':rollbackRestore();break;
    case 'sync':contentSync(true);break;
    case 'reset':resetAll();break;
  }
});
$('#fileB').addEventListener('change',e=>readFile(e,restoreBackup));
$('#fileP').addEventListener('change',e=>readFile(e,obj=>{
  const n=applyPack(obj);
  sysMsg(n?('Загружено новых записей: '+n):'Новых записей нет');
}));
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){checkDailyReset();scheduleRollover();render();}
});

/* ---------- запуск ---------- */
checkDailyReset();
save();
render();
scheduleRollover();
contentSync(false);
if('serviceWorker' in navigator){
  addEventListener('load',()=>{
    const hadController=!!navigator.serviceWorker.controller;let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(hadController&&!refreshing){refreshing=true;location.reload();}
    });
    navigator.serviceWorker.register('./sw.js')
      .then(()=>navigator.serviceWorker.ready)
      .then(()=>{if(!hadController)sysMsg('ОФЛАЙН-РЕЖИМ ГОТОВ');})
      .catch(err=>{console.error('Service worker:',err);sysMsg('Не удалось подготовить офлайн-режим');});
  });
}
})();
</script>
</body>
</html>
